<div class="flex justify-content-between align-items-center mb-3">
  <h3 class="m-0">Asignación Rol - Menú</h3>
  <p-button label="Nueva Asignación" icon="pi pi-plus" (onClick)="openNew()"></p-button>
</div>

<p-table [value]="relaciones" [paginator]="true" [rows]="10">
  <ng-template pTemplate="header">
    <tr><th>Rol</th><th>Menú</th><th></th></tr>
  </ng-template>
  <ng-template pTemplate="body" let-rel>
    <tr>
      <td>{{ rel.rolW.nombre }}</td>
      <td>{{ rel.menuW.nombre }}</td>
      <td>
        <p-button icon="pi pi-pencil" [text]="true" size="small" (onClick)="openEdit(rel)"></p-button>
      </td>
    </tr>
  </ng-template>
</p-table>

<p-dialog header="{{ isEditMode ? 'Editar' : 'Nueva' }} Asignación" [(visible)]="dialogVisible" [modal]="true" [style]="{width: '450px'}">
  <div class="flex flex-column gap-3">
    <div class="field">
      <label>Rol</label>
      <p-dropdown [options]="roles" [(ngModel)]="form.rolW" optionLabel="nombre"
                  [filter]="true" filterBy="nombre" appendTo="body" class="w-full"></p-dropdown>
    </div>
    <div class="field">
      <label>Menú</label>
      <p-dropdown [options]="menus" [(ngModel)]="form.menuW" optionLabel="nombre"
                  [filter]="true" filterBy="nombre" appendTo="body" class="w-full"></p-dropdown>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancelar" [text]="true" (onClick)="dialogVisible = false"></p-button>
    <p-button label="Guardar" (onClick)="save()"></p-button>
  </ng-template>
</p-dialog>
