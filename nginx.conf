server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Ocultar versión de nginx
    server_tokens off;

    # Headers de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Content Security Policy (una sola línea, evita problemas de parsing)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://apis.cumpleanos.com.ec wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Rendimiento
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Compresión
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # Health Check
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # Cache para recursos estáticos (Angular genera nombres con hash)
    location ~* \.(?:css|js|mjs|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # No cache para index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Angular SPA Routing
    location / {
        try_files $uri /index.html;
    }

    # Bloquear archivos ocultos (excepto .well-known, usado por Let's Encrypt, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear acceso a archivos sensibles
    location ~* \.(env|log|ini|conf|bak|sql|yml|yaml)$ {
        deny all;
    }
}
